<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

   <div class="container w-75 mx-auto p-4">
    <h2 class="text-center">Soumission de Candidature</h2>
   <form class="">
       <div class="mb-3">
        <label for="">NomComplet</label>
        <input type="text" id="Nmc" class="form-control">
       </div>
      <div class="mb-3">
        <label for="">ville</label>
        <select  id="ville" class="form-select">
            <option value="" selected disabled>choisir une ville ....</option>
            <option value="Agadir">Agadir</option>
            <option value="Safi">Safi</option>
            <option value="Rabat">Rabat</option>
        </select>
    </div>
   <div class="mb-3">
        <label for="">compétance</label>
        <select id="compt" class="form-select">
            <option value="" selected disabled>choisir une compétone ....</option>
            <option value="medecin">médecin</option>
            <option value="éducateur spécialsé">éducateur spécialsé</option>
        </select>
    </div>
    
    <div class="mb-3">
        <label for="">disponibilités</label>
        <select id="dispo" class="form-select">
            <option value="" selected disabled>choisir une disponibilités ....</option>
            <option value="semaine">semaine</option>
            <option value="week-end">week-end</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="">missions souhaitées</label>
        <select id="mission" class="form-select">
            <option value="" selected disabled>choisir une missions ....</option>
            <option value="consulations médicales">consulations médicales</option>
            <option value="distributiom de nourriture">distributiom de nourriture</option>
        </select>
    </div>
   <div class="mb-3">
        <label for="">Email: </label>
        <input type="email" id="email" class="form-control">
    </div>

    <div class="mb-3">
     <label for="">Mod de passe : </label>
     <input type="password" id="modpass" class="form-control">
    </div>
    
    <button  type="button" class="btn btn-primary w-100" onclick="ajoute()">Envoyer</button>
    
   </form>
   <table class="table table-bordered mt-4">
    <thead class="table-dark">
        <tr>
            <th>NomComplet</th>
            <th>ville</th>
            <th>compétance</th>
            <th>disponibilités</th>
            <th>missions souhaitées</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="body">
        
    </tbody>
   </table>
   </div>
     




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
